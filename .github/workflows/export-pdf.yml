name: Export Resume PDF

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Export PDF
        run: npm run export:pdf

      - name: Publish PDF as GitHub Release asset
        uses: ncipollo/release-action@v1
        with:
          tag: resume-pdf-latest
          name: Resume PDF (latest)
          body: |
            Automatically generated resume PDF from the latest `main` commit.
            Source commit: ${{ github.sha }}
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifacts: resume.pdf
