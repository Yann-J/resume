items:
  - title: Director of Engineering
    company: One Acre Fund
    logo: ./assets/logos/oaf.png
    period: "2020 - 2026"
    location: "🇷🇼 Kigali, Rwanda"
    description: |
      On a mission to restructure tech teams, modernize legacy platforms, and support digital transformation and AgTech strategy.

      - **Restructured and expanded the team** from around 10 to 65 engineers
      - **Led modernization of legacy solutions to a cloud-based open-source stack** across 8 African countries, based on Odoo | Fineract | Keycloak | Payment Hub | ODK
      - **Rolled out BI and analytics platform** Snowflake | Airbyte | Superset
      - **Built DevOps operations around CI/CD, Kubernetes, and observability** for 500+ containers
  - title: Head of Bespoke Developments APAC
    company: Amadeus
    logo: ./assets/logos/amadeus.png
    period: "2016 - 2019"
    location: "🇹🇭 Bangkok, Thailand"
    description: |
      Took over distributed teams of around 50 developers across APAC during major transformation

      - Reduced development locations from 7 to 3 and increased automation to about 60% in one year
      - Led stack modernization initiatives, including Docker and Angular migrations
  - title: Senior Manager, Flight Management, Airport IT
    company: Amadeus
    logo: ./assets/logos/amadeus.png
    period: "2012 - 2016"
    location: "🇫🇷 Sophia-Antipolis, France then 🇸🇬 Singapore"
    description: |
      Directed development of core AODB and flight data processing components

      - Scaled teams from 8 to 50+ in France and India with fast delivery cycles
      - Supported post-acquisition integration and technology harmonization
  - title: Manager
    company: Ness Technologies (for Amadeus)
    logo: ./assets/logos/amadeus.png
    period: "2008 - 2012"
    location: "🇮🇳 Bangalore, India"
    description: |
      Contributed to growth of the first Amadeus development center in India from 20 to 500+ people

      - Led infrastructure integration, coaching, and project management practices
      - Played a key role in launching high-profile projects including a first mobile competency center
  - title: DevOps Engineer, then Architect
    company: Amadeus
    logo: ./assets/logos/amadeus.png
    period: "2002 - 2008"
    location: "🇫🇷 Sophia-Antipolis, France"
    description: |
      Provided technical consultancy and cross-division coordination for large programs

      - Built strong foundations in architecture, platform reliability, and delivery governance
