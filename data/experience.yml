items:
  - title: "**Director of Engineering**"
    company: One Acre Fund
    logo: ./assets/logos/oaf.png
    period: "2020 - 2026"
    location: "🇷🇼 Kigali, Rwanda"
    description: |
      On a mission to restructure tech teams, modernize legacy platforms, and support digital transformation and AgTech strategy

      - **Restructured and expanded the team** from around 10 to 65+ engineers
      - **Led modernization of legacy solutions to a cloud-based open-source stack** across 8 African countries, based on Odoo | Fineract | Keycloak | Payment Hub | ODK
      - **Rolled out BI and analytics platform** Snowflake | Airbyte | Superset
      - **Built DevOps operations around CI/CD, Kubernetes, and observability** for 800+ containers

